<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيادة السكري - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            color: #d32f2f;
        }
        
        .logo h1 {
            font-size: 24px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            position: relative;
        }
        
        .tab-btn.active {
            color: #d32f2f;
            font-weight: bold;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #d32f2f;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .phone-input {
            display: flex;
        }
        
        .phone-input select {
            width: 30%;
            margin-right: 10px;
        }
        
        .phone-input input {
            width: 70%;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #b71c1c;
        }
        
        .message-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background-color: #d32f2f;
            color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
        }
        
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 15px;
            }
            
            .phone-input select {
                width: 40%;
            }
            
            .phone-input input {
                width: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>عيادة السكري</h1>
        </div>
        
        <div class="form-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">إنشاء حساب</button>
            </div>
            
            <!-- نموذج تسجيل الدخول -->
            <div id="login" class="tab-content active">
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginPhone">رقم الهاتف</label>
                        <div class="phone-input">
                            <select id="loginCountryCode" name="countryCode" required>
                                <option value="+972">+972 (الداخل المحتل)</option>
                                <option value="+20">+20 (مصر)</option>
                                <option value="+970">+970(فلسطين)</option>
                                <option value="+962">+962 (الأردن)</option>
                                <option value="+973">+973 (البحرين)</option>
                            </select>
                            <input type="tel" id="loginPhone" name="phone" placeholder="5XXXXXXXX" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="loginPassword">كلمة المرور</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn">تسجيل الدخول</button>
                </form>
            </div>
            
            <!-- نموذج إنشاء حساب -->
            <div id="register" class="tab-content">
                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullName">الاسم الكامل</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="registerPhone">رقم الهاتف</label>
                        <div class="phone-input">
                            <select id="registerCountryCode" name="countryCode" required>
                                <option value="+972">+972 (الداخل المحتل)</option>
                                <option value="+20">+20 (مصر)</option>
                                <option value="+970">+970(فلسطين)</option>
                                <option value="+962">+962 (الأردن)</option>
                                <option value="+973">+973 (البحرين)</option>
                            </select>
                            <input type="tel" id="registerPhone" name="phone" placeholder="5XXXXXXXX" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="registerPassword">كلمة المرور</label>
                        <input type="password" id="registerPassword" name="password" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="confirmPassword">تأكيد كلمة المرور</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    
                    <button type="submit" class="btn">إنشاء حساب</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="message-popup" id="messagePopup">
        <p id="messageText"></p>
    </div>
    
    <script>
        // تبديل التبويبات
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
        }
        
        // تحميل بيانات المستخدمين من localStorage
        function loadUsers() {
            const savedUsers = localStorage.getItem('diabetesClinicUsers');
            return savedUsers ? JSON.parse(savedUsers) : [];
        }
        
        // حفظ بيانات المستخدمين في localStorage
        function saveUsers(users) {
            localStorage.setItem('diabetesClinicUsers', JSON.stringify(users));
        }
        
        // عرض رسالة للمستخدم
        function showMessage(message) {
            const popup = document.getElementById('messagePopup');
            const messageText = document.getElementById('messageText');
            
            messageText.textContent = message;
            popup.style.display = 'block';
            
            setTimeout(() => {
                popup.style.display = 'none';
            }, 3000);
        }
        
        // تسجيل مستخدم جديد
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const countryCode = document.getElementById('registerCountryCode').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // التحقق من تطابق كلمتي المرور
            if (password !== confirmPassword) {
                showMessage('كلمتا المرور غير متطابقتين');
                return;
            }
            
            // تحميل المستخدمين الحاليين
            const users = loadUsers();
            
            // التحقق من عدم وجود مستخدم بنفس الرقم
            const userExists = users.some(user => user.phone === countryCode + phone);
            if (userExists) {
                showMessage('هذا الرقم مسجل بالفعل');
                return;
            }
            
            // إضافة المستخدم الجديد
            const newUser = {
                id: 'user_' + Date.now(),
                fullName,
                phone: countryCode + phone,
                password
            };
            
            users.push(newUser);
            saveUsers(users);
            
            showMessage('تم إنشاء الحساب بنجاح');
            switchTab('login');
            
            // تعبئة بيانات تسجيل الدخول تلقائياً
            document.getElementById('loginCountryCode').value = countryCode;
            document.getElementById('loginPhone').value = phone;
        });
        
        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const countryCode = document.getElementById('loginCountryCode').value;
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;
            const fullPhone = countryCode + phone;
            
            // تحميل المستخدمين
            const users = loadUsers();
            
            // البحث عن المستخدم
            const user = users.find(u => u.phone === fullPhone && u.password === password);
            
            if (user) {
                // حفظ حالة تسجيل الدخول
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                showMessage('تم تسجيل الدخول بنجاح');
                // توجيه المستخدم للصفحة الرئيسية
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                showMessage('رقم الهاتف أو كلمة المرور غير صحيحة');
            }
        });
        
        // عند تحميل الصفحة، تحقق إذا كان هناك مستخدم مسجل دخوله بالفعل
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
